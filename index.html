<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Loyalty Hub Product Map</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar" aria-label="产品筛选" data-i18n-aria="sidebarLabel">
        <div class="brand-block">
          <span class="brand-mark">LH</span>
          <div>
            <p class="eyebrow">Product Map</p>
            <h1>Loyalty Hub</h1>
          </div>
        </div>

        <section class="language-switch" aria-label="Language">
          <button class="lang-option active" data-lang="zh">中文</button>
          <button class="lang-option" data-lang="en">EN</button>
        </section>

        <label class="search-box">
          <span data-i18n="searchLabel">搜索</span>
          <input id="searchInput" type="search" placeholder="产品、描述、渠道、排期..." />
        </label>

        <section class="filter-group">
          <div class="filter-title" data-i18n="levelFilter">产品层级</div>
          <div id="levelFilters" class="segmented"></div>
        </section>

        <section class="filter-group">
          <div class="filter-title" data-i18n="channelFilter">渠道支持</div>
          <div id="channelFilters" class="check-list"></div>
        </section>

        <section class="filter-group">
          <div class="filter-title" data-i18n="statusFilter">状态</div>
          <div class="segmented compact">
            <button class="chip active" data-status="all"></button>
            <button class="chip" data-status="supported"></button>
            <button class="chip" data-status="planned"></button>
            <button class="chip" data-status="no-plan"></button>
          </div>
        </section>

        <section class="filter-group">
          <div class="filter-title" data-i18n="viewFilter">视图</div>
          <div class="segmented compact">
            <button class="chip active" data-view="cards"></button>
            <button class="chip" data-view="matrix"></button>
          </div>
        </section>
      </aside>

      <main class="workspace">
        <section class="top-panel">
          <img src="./assets/product-map-banner.png" alt="" />
          <div class="top-copy">
            <p class="eyebrow">L1 - L4 Capability Browser</p>
            <h2 data-i18n="heroTitle">Loyalty Hub产品地图</h2>
            <div id="stats" class="stats-grid"></div>
          </div>
        </section>

        <section class="hierarchy-strip" id="hierarchyStrip" aria-label="产品层级定义" data-i18n-aria="hierarchyLabel"></section>

        <section class="toolbar">
          <div>
            <p id="resultMeta" class="result-meta"></p>
            <p class="source-note" data-i18n="sourceNote">数据源：LoyaltyHub Product Map.xlsx / Loyalty Hub Products Map</p>
          </div>
          <button id="resetBtn" class="text-button" data-i18n="reset">重置筛选</button>
        </section>

        <section id="cardsView" class="product-grid"></section>
        <section id="matrixView" class="matrix-wrap" hidden></section>
      </main>
    </div>

    <aside id="detailDrawer" class="detail-drawer" aria-hidden="true">
      <div class="drawer-card">
        <button id="closeDrawer" class="icon-button" aria-label="关闭详情" data-i18n-aria="closeDetail">×</button>
        <div id="drawerContent"></div>
      </div>
    </aside>

    <script src="./data.js"></script>
    <script src="./app.js"></script>
  </body>
</html>
